# ============================================================
# application.properties — Configuración de NewsVerifier
# ============================================================

# ── Servidor ─────────────────────────────────────────────────
server.port=8080

# ── Thymeleaf ────────────────────────────────────────────────
# cache=false para que los cambios en plantillas se vean
# sin reiniciar (útil durante desarrollo)
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML

# ── Base de datos H2 (en memoria) ────────────────────────────
# La BBDD se crea al arrancar y se destruye al parar la app.
# Para persistir datos entre reinicios, cambia mem: por file:
# Ejemplo: jdbc:h2:file:./data/newsverifierdb
spring.datasource.url=jdbc:h2:mem:newsverifierdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# update: crea/actualiza tablas automáticamente según las entidades JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Consola H2 accesible en: http://localhost:8080/h2-console
# JDBC URL a usar en la consola: jdbc:h2:mem:newsverifierdb
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── API Python de IA ─────────────────────────────────────────
# URL del microservicio Python de análisis de fake news.
# Cambiar si la API corre en otro servidor o puerto.
ia.api.url=http://localhost:5000/analizar

# Modo mock:
#   true  → usa datos simulados, no necesita la API Python activa
#   false → llama a la API Python; si falla, cae al mock automáticamente
ia.mock.enabled=true

# ── Logging ──────────────────────────────────────────────────
logging.level.com.newsverifier=DEBUG
